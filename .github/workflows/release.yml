name: Create Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Extract Release Notes
        shell: bash
        run: |
          # Use a simple python snippet to extract the notes
          python3 -c "
          import os
          version = os.environ.get('GITHUB_REF_NAME', '').replace('v', '')
          notes_path = 'RELEASE_NOTES.md'
          if not os.path.exists(notes_path):
              exit(0)
          with open(notes_path, 'r', encoding='utf-8') as f:
              lines = f.readlines()
          header = f'# Release v{version}'
          start = -1
          for i, l in enumerate(lines):
              if l.strip() == header:
                  start = i
                  break
          if start == -1:
              exit(0)
          notes = []
          for i in range(start + 1, len(lines)):
              if lines[i].startswith('# Release v'):
                  break
              notes.append(lines[i])
          with open('latest_notes.md', 'w', encoding='utf-8') as f:
              f.write(''.join(notes).strip())
          "

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: latest_notes.md
          generate_release_notes: true # Fallback if latest_notes.md is empty

  build-windows-exe:
    # Remove needs: release so it still runs even if the release job is skipped
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          pyinstaller --name mqtt-proxy-windows-amd64 --onefile --console --runtime-tmpdir "%LOCALAPPDATA%\Temp" mqtt-proxy.py

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/mqtt-proxy-windows-amd64.exe
          
      - name: Upload Build Artifact (for validation)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: mqtt-proxy-windows-amd64
          path: dist/mqtt-proxy-windows-amd64.exe
