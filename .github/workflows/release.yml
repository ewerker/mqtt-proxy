name: Create Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: latest_notes.md
          generate_release_notes: false

  build-windows-exe:
    # Remove needs: release so it still runs even if the release job is skipped
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          pyinstaller --name mqtt-proxy-windows-amd64 --onefile --console --runtime-tmpdir "%LOCALAPPDATA%\Temp" mqtt-proxy.py

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/mqtt-proxy-windows-amd64.exe
          
      - name: Upload Build Artifact (for validation)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: mqtt-proxy-windows-amd64
          path: dist/mqtt-proxy-windows-amd64.exe
