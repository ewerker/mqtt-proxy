name: Create Release

on:
  push:
    tags:
      - "v*.*.*"
      - "alpha-*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g. v1.6.3)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Extract Release Notes
        shell: bash
        run: |
          python3 -c "
          import os, re
          tag = '${{ steps.tag.outputs.tag }}'
          version = tag.replace('v', '')
          notes_path = 'RELEASE_NOTES.md'
          default_notes = f'Release {tag}'
          if not os.path.exists(notes_path):
              with open('latest_notes.md', 'w', encoding='utf-8') as f:
                  f.write(default_notes)
              exit(0)
          with open(notes_path, 'r', encoding='utf-8') as f:
              lines = f.readlines()
          header = f'# Release v{version}'
          start = -1
          for i, l in enumerate(lines):
              if l.strip() == header:
                  start = i
                  break
          if start == -1:
              with open('latest_notes.md', 'w', encoding='utf-8') as f:
                  f.write(default_notes)
              exit(0)
          notes = []
          for i in range(start + 1, len(lines)):
              # Stop if we hit the next release header
              if re.match(r'^#\s+Release\s+v[\d\.]+', lines[i].strip()):
                  break
              # Skip trailing separators
              if lines[i].strip() == '---' and len(notes) > 0 and i+1 < len(lines) and re.match(r'^#\s+Release\s+v[\d\.]+', lines[i+1].strip()):
                  continue
              notes.append(lines[i])
          with open('latest_notes.md', 'w', encoding='utf-8') as f:
              f.write(''.join(notes).strip() or default_notes)
          "

      - name: Create or Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file latest_notes.md
          fi
